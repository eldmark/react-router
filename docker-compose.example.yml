services:
  backend:
    build:
      context: .
      dockerfile: server/Dockerfile
    ports:
      - "3002:3001"
    volumes:
      - movie-data:/app/server/data

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    ports:
      - "5174:5173"
    environment:
      VITE_API_PROXY_TARGET: http://backend:3001
      VITE_OMDB_API_KEY: ${VITE_OMDB_API_KEY}
    depends_on:
      - backend
    volumes:
      - .:/app
      - frontend-node-modules:/app/node_modules

volumes:
  movie-data:
  frontend-node-modules:
